<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - @{{ outro_usuario.username }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #000; --surface: #111; --border: #222; --text: #f0f0f0; --accent: #1d9bf0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    header { background: rgba(8,8,8,0.9); padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    header a { color: var(--accent); text-decoration: none; font-size: 1.2rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 1rem; margin: 0; }
    
    .mensagens-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .balao { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
    .enviada { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
    .recebida { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--border); }
    
    form { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: #080808; }
    input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 9999px; color: var(--text); padding: 12px 16px; outline: none; font-family: inherit; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #000; border: none; font-family: 'Syne', sans-serif; font-weight: bold; padding: 0 20px; border-radius: 9999px; cursor: pointer; }
  </style>
</head>
<body>
  <header><a href="{% url 'feed' %}">←</a><h1>Chat com @{{ outro_usuario.username }}</h1></header>
  
  <div class="mensagens-container" id="chat-box">
    {% for m in mensagens %}
      <div class="balao {% if m.remetente == request.user %}enviada{% else %}recebida{% endif %}">
        {{ m.texto }}
      </div>
    {% empty %}
      <p style="color: #555; text-align: center; margin-top: auto; margin-bottom: auto;">Nenhuma mensagem ainda. Diga olá!</p>
    {% endfor %}
  </div>

  <form method="POST">
    {% csrf_token %}
    <input type="text" name="mensagem" placeholder="Escreva uma mensagem..." autocomplete="off" required>
    <button type="submit">Enviar</button>
  </form>

  <script>
    // Mantém o chat sempre rolando para a última mensagem de forma automática
    const chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
  </script>
</body>
</html>
