<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeXus - Atualizar Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #555555;
      --accent: #1d9bf0;
      --accent-dark: #1a8cd8;
      --error-bg: #2c1515;
      --error-border: #7a2020;
      --error-text: #f4a0a0;
      --success-bg: #112a14;
      --success-border: #1f5c25;
      --success-text: #a8f4b2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .logo span { color: var(--accent); }

    .subtitulo {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    .alert.erro {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .alert.sucesso {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    .campo {
      margin-bottom: 14px;
    }

    .linha-dupla {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .label-destaque {
      color: var(--accent);
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 9999px;
      padding: 13px;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:hover { background: var(--accent-dark); }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Ne<span>X</span>us</div>
    <p class="subtitulo">Atualize as informações do seu perfil</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert {% if msg.tags == 'success' %}sucesso{% else %}erro{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      
      <div class="campo">
        <label for="id_username" class="label-destaque">Username</label>
        <input type="text" id="id_username" name="username_referencia" placeholder="Digite seu username atual" required />
      </div>

      <div class="linha-dupla">
        <div class="campo">
          <label for="id_first_name">Primeiro Nome</label>
          <input type="text" id="id_first_name" name="first_name" placeholder="Novo ou atual nome" required />
        </div>
        <div class="campo">
          <label for="id_last_name">Último Nome</label>
          <input type="text" id="id_last_name" name="last_name" placeholder="Novo ou atual sobrenome" required />
        </div>
      </div>

      <div class="campo">
        <label for="id_email">E-mail</label>
        <input type="email" id="id_email" name="email" placeholder="seu-novo@email.com" required />
      </div>

      <button type="submit" class="btn">Salvar Alterações</button>
    </form>
  </div>
</body>
</html>
