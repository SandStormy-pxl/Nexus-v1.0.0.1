<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeXus - Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #555555;
      --accent: #1d9bf0;
      --accent-dark: #1a8cd8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* CONTAINER PRINCIPAL DO CONTEÚDO */
    .container-users {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 110px; /* O padding-bottom impede que o conteúdo suma atrás da nav-bar */
    }

    .titulo-pagina {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    /* BARRA DE PESQUISA */
    .campo-pesquisa-wrapper {
      margin-bottom: 24px;
      width: 100%;
    }

    #input-pesquisa {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-pesquisa:focus {
      border-color: var(--accent);
    }

    /* LISTA DE MEMBROS */
    .lista-membros {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .bloco-user {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      padding: 16px 8px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user-nome-completo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.2;
    }

    .user-username {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .user-username::before { 
      content: '@'; 
      color: var(--accent); 
    }

    /* NAV-BAR FIXADA EMBAIXO */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 9999;
      height: 84px;
      background-color: #080808 !important;
      border-top: 1px solid var(--border);
    }

    .nav-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: #f0f0f0;
      margin-bottom: 6px;
    }

    .logo span { color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 0 8px;
    }

    .btn-post, .btn-users, .btn-logout {
      padding: 6px 12px; 
      font-size: 0.75rem;
      text-align: center;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      border-radius: 9999px;
    }

    .btn-post { background: var(--accent); color: #000; }
    .btn-users { border: 1px solid var(--border); color: var(--text); background: var(--surface); }
    .btn-logout { border: 1px solid var(--border); color: var(--muted); }

    .vazio {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  {% if exibir_alerta %}
  <div style="
    background-color: #e11d48; /* Vermelho alerta */
    color: #ffffff;
    text-align: center;
    padding: 10px 20px;
    font-size: 0.95rem;
    font-weight: bold;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    z-index: 9999;
    position: relative;
">
    📢 <span>{{ texto_alerta }}</span>
  </div>
  {% endif %}


  <div class="container-users">
    <h1 class="titulo-pagina">Membros da Comunidade</h1>

    <div class="campo-pesquisa-wrapper">
      <input type="text" id="input-pesquisa" placeholder="Pesquisar por nome ou @username..." autocomplete="off"/>
    </div>

    <div class="lista-membros" id="lista-membros">
      {% for user in users %}
        <div class="bloco-user">
          <span class="user-nome-completo">{{ user.first_name }} {{ user.last_name }}</span>
          <span class="user-username">{{ user.username }}</span>
        </div>
      {% empty %}
        <div class="vazio">
          <p>Nenhum usuário cadastrado.</p>
        </div>
      {% endfor %}
    </div>
  </div>

  <nav class="nav-bar">
    <div class="nav-container">
      <div class="logo">Ne<span>X</span>us</div>
      <div class="header-actions">
        <a href="{% url 'criar_post' %}" class="btn-post">+ Postar</a>
        <a href="{% url 'users' %}" class="btn-users">Comunidade</a>
        <a href="{% url 'logout' %}" class="btn-logout">Sair</a>
      </div>
    </div>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const inputPesquisa = document.getElementById('input-pesquisa');
      const blocosusers = document.querySelectorAll('.bloco-user');

      inputPesquisa.addEventListener('input', function() {
        const termo = inputPesquisa.value.toLowerCase().trim();

        blocosusers.forEach(bloco => {
          const nomeCompleto = bloco.querySelector('.user-nome-completo').textContent.toLowerCase();
          const username = bloco.querySelector('.user-username').textContent.toLowerCase();

          if (nomeCompleto.includes(termo) || username.includes(termo)) {
            bloco.style.display = 'flex';
          } else {
            bloco.style.display = 'none';
          }
        });
      });
    });
  </script>

</body>
</html>
