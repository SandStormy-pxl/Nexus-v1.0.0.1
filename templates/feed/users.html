<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeXus - Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #555555;
      --accent: #1d9bf0;
      --accent-dark: #1a8cd8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: rgba(8, 8, 8, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-feed {
      display: flex;
      align-items: center;
      background: var(--accent);
      color: #000;
      text-decoration: none;
      padding: 7px 16px;
      border-radius: 9999px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-feed:active { transform: scale(0.96); }
    .btn-feed:hover { background: var(--accent-dark); }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 9999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--muted); color: var(--text); }

    .container-usuarios {
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 16px 40px;
    }

    .titulo-pagina {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .bloco-usuario {
      display: flex;
      flex-direction: column;
      background: transparent;
      border-bottom: 1px solid var(--border);
      padding: 18px 8px;
      animation: fadeUp 0.35s ease both;
      transition: background 0.2s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bloco-usuario:hover { 
      background: rgba(255, 255, 255, 0.015); 
    }

    .usuario-nome-completo {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.2;
    }

    .usuario-username {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.2px;
    }

    .usuario-username::before { 
      content: '@'; 
      color: var(--accent); 
    }

    .vazio {
      text-align: center;
      color: var(--muted);
      padding: 80px 20px;
    }
    .vazio .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .vazio p { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; color: #333; }
    .vazio small { font-size: 0.82rem; color: var(--muted); margin-top: 6px; display: block; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Ne<span>X</span>us</div>
    <div class="header-actions">
      <a href="{% url 'feed' %}" class="btn-feed">Feed</a>
      <a href="{% url 'logout' %}" class="btn-logout">Sair</a>
    </div>
  </header>

  <div class="container-usuarios">
    <h1 class="titulo-pagina">Membros da Comunidade</h1>

    {% for user in users %}
      <div class="bloco-usuario">
        <span class="usuario-nome-completo">
          {{ user.first_name }} {{ user.last_name }}
        </span>
        
        <span class="usuario-username">{{ user.username }}</span>
      </div>
    {% empty %}
      <div class="vazio">
        <span class="icon">◎</span>
        <p>Nenhum usuário cadastrado.</p>
        <small>Parece que você está sozinho por aqui.</small>
      </div>
    {% endfor %}
  </div>

</body>
</html>
