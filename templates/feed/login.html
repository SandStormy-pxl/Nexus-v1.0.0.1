<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #555555;
      --accent: #1d9bf0;
      --accent-dark: #1d9bf0;
      --error-bg: #2c1515;
      --error-border: #7a2020;
      --error-text: #f4a0a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .logo span { color: var(--accent); }

    .subtitulo {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .erros {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--error-text);
    }

    .campo {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 9999px;
      padding: 13px;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:hover { background: var(--accent-dark); }
    .btn:active { transform: scale(0.97); }

    .rodape {
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .rodape a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Drop<span>.</span>com</div>
    <p class="subtitulo">Entre na sua conta</p>

    {% if messages %}
      {% for msg in messages %}
        <div class="erros">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    {% if form.errors %}
      <div class="erros">
        {% for campo, erros in form.errors.items %}
          {% for erro in erros %}<div>{{ erro }}</div>{% endfor %}
        {% endfor %}
      </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="campo">
        <label for="id_username">Usuário</label>
        <input type="text" id="id_username" name="username" placeholder="seu_usuario" autocomplete="username" />
      </div>
      <div class="campo">
        <label for="id_password">Senha</label>
        <input type="password" id="id_password" name="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>

    <p class="rodape">Não tem conta? <a href="{% url 'signup' %}">Cadastre-se</a></p>
  </div>
</body>
</html>
