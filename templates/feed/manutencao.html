<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Manutenção</title>
    <style>
        body {
            background-color: #15202b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background-color: #1e2732;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1d9bf0;
            font-size: 2rem;
            margin-bottom: 16px;
        }
        p {
            color: #8899a6;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🛠️</div>
        <h1>Estamos em Manutenção</h1>
        <p>{{ mensagem }}</p>
    </div>
</body>
</html>
