<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeXus - Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #080808; --surface: #111; --border: #222; --text: #f0f0f0; --accent: #1d9bf0; --muted: #555; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding-bottom: 40px; }
    header { position: sticky; top: 0; background: rgba(8,8,8,0.9); backdrop-filter: blur(8px); padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
    header a { color: var(--accent); text-decoration: none; font-size: 1.2rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 1rem; margin: 0; }
    .container { max-width: 560px; margin: 0 auto; padding: 16px; }
    .post-principal { border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .autor { font-family: 'Syne', sans-serif; font-weight: bold; color: var(--accent); text-decoration: none; }
    .texto { font-size: 1.1rem; margin: 12px 0; color: #e0e0e0; }
    .img-post { width: 100%; border-radius: 12px; margin-top: 8px; }
    .btn-like { background: none; border: none; color: var(--text); font-family: 'Syne', sans-serif; font-weight: bold; cursor: pointer; padding: 6px 12px; border-radius: 20px; background: var(--surface); margin-top: 10px; }
    .curtido { color: #e11d48; }
    
    .secao-comentarios { margin-top: 24px; }
    .box-comentario { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .meta-comentario { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; }
    .meta-comentario a { color: var(--accent); text-decoration: none; font-weight: bold; }
    
    form-comentar { display: flex; gap: 8px; margin-top: 16px; }
    textarea { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; resize: none; font-family: inherit; }
    button-enviar { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 0 16px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <header><a href="{% url 'feed' %}">←</a><h1>Publicação</h1></header>
  <div class="container">
    <div class="post-principal">
      <a href="{% url 'perfil' post.autor.username %}" class="autor">@{{ post.autor.username }}</a>
      <p class="texto">{{ post.texto }}</p>
      {% if post.imagem_b64 %}<img src="{{ post.imagem_b64 }}" class="img-post">{% endif %}
      
      <form action="{% url 'curtir_post' post.id %}" method="POST" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn-like {% if ja_curtiu %}curtido{% endif %}">
          ♥ {{ total_curtidas }}
        </button>
      </form>
    </div>

    <div class="secao-comentarios">
      <h3>Comentários</h3>
      {% for c in comentarios %}
        <div class="box-comentario">
          <div class="meta-comentario"><a href="{% url 'perfil' c.usuario.username %}">@{{ c.usuario.username }}</a> · {{ c.criado_em|date:"H:i" }}</div>
          <div>{{ c.texto }}</div>
        </div>
      {% empty %}
        <p style="color: var(--muted); text-align: center;">Ninguém comentou ainda.</p>
      {% endfor %}

      <form method="POST" style="display: flex; gap: 8px; margin-top: 20px;">
        {% csrf_token %}
        <textarea name="texto" rows="2" placeholder="Escreva um comentário..." required></textarea>
        <button type="submit" class="btn-like" style="background: var(--accent); color:#000;">Mandar</button>
      </form>
    </div>
  </div>
</body>
</html>
